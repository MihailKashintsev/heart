<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeartAI — demorg</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --red:#ff0033; --red2:#cc0022; --red3:#880011;
  --glow:rgba(255,0,51,0.4); --faint:rgba(255,0,51,0.07);
  --bg:#05050a; --bg2:#0b0b14; --bg3:#11111c;
  --text:#ede6e6; --mono:'Share Tech Mono',monospace; --disp:'Orbitron',sans-serif;
  --sw:320px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:200;}

.app{display:flex;height:100vh;width:100vw;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:var(--sw);flex-shrink:0;background:var(--bg2);border-right:1px solid rgba(255,0,51,0.18);display:flex;flex-direction:column;transition:width .35s cubic-bezier(.4,0,.2,1),opacity .3s;overflow:hidden;}
.sidebar.collapsed{width:0;opacity:0;pointer-events:none;}
.sidebar-header{padding:18px 20px 14px;border-bottom:1px solid rgba(255,0,51,0.14);flex-shrink:0;background:linear-gradient(180deg,rgba(255,0,51,0.05) 0%,transparent 100%);}
.sidebar-title{font-family:var(--disp);font-size:11px;color:var(--red);letter-spacing:4px;text-shadow:0 0 8px var(--red);margin-bottom:14px;}
.sidebar-body{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:24px;}
.sidebar-body::-webkit-scrollbar{width:3px;}
.sidebar-body::-webkit-scrollbar-thumb{background:rgba(255,0,51,0.18);border-radius:2px;}
.sec-lbl{font-size:10px;letter-spacing:4px;color:rgba(255,0,51,0.38);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:rgba(255,0,51,0.1);}
.field-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.field-lbl{font-size:10px;color:rgba(255,0,51,0.38);letter-spacing:2px;width:48px;flex-shrink:0;}
.finp{flex:1;background:var(--bg3);border:1px solid rgba(255,0,51,0.14);border-radius:2px;padding:7px 10px;font-family:var(--mono);font-size:11px;color:rgba(255,0,51,0.65);outline:none;transition:border-color .2s;}
.finp:focus{border-color:rgba(255,0,51,0.38);box-shadow:0 0 8px rgba(255,0,51,0.2);}
.finp::placeholder{color:rgba(255,0,51,0.18);}
.pbtn{background:rgba(255,0,51,0.09);border:1px solid rgba(255,0,51,0.3);color:var(--red);font-family:var(--mono);font-size:10px;padding:8px;border-radius:2px;cursor:pointer;letter-spacing:2px;width:100%;transition:all .2s;text-shadow:0 0 5px var(--red);margin-top:4px;}
.pbtn:hover{background:rgba(255,0,51,0.18);box-shadow:0 0 10px var(--glow);}
.key-list{display:flex;flex-direction:column;gap:7px;}
.empty-lbl{font-size:10px;color:rgba(255,0,51,0.2);letter-spacing:2px;padding:6px 0;}
.key-item{background:var(--bg3);border:1px solid rgba(255,0,51,0.1);border-radius:2px;padding:10px 12px;transition:border-color .2s;}
.key-item:hover{border-color:rgba(255,0,51,0.22);}
.ki-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.ki-dot{width:5px;height:5px;border-radius:50%;background:var(--red);box-shadow:0 0 4px var(--red);flex-shrink:0;}
.ki-name{font-size:11px;color:rgba(255,255,255,0.65);flex:1;}
.ki-val{font-size:10px;color:rgba(255,0,51,0.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ki-btns{display:flex;gap:5px;margin-top:6px;}
.kbtn{font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:2px;cursor:pointer;font-family:var(--mono);transition:all .2s;}
.kbtn.cp{background:var(--faint);border:1px solid rgba(255,0,51,0.18);color:rgba(255,0,51,0.5);}
.kbtn.cp:hover{background:rgba(255,0,51,0.14);color:var(--red);}
.kbtn.dl{background:transparent;border:1px solid rgba(255,0,51,0.1);color:rgba(255,0,51,0.28);}
.kbtn.dl:hover{background:rgba(255,0,51,0.1);color:var(--red);border-color:rgba(255,0,51,0.28);}
.new-form{background:var(--bg3);border:1px dashed rgba(255,0,51,0.18);border-radius:2px;padding:14px;display:flex;flex-direction:column;gap:8px;}
.new-row{display:flex;gap:7px;}
.gbtn{background:rgba(255,0,51,0.09);border:1px solid rgba(255,0,51,0.28);color:var(--red);font-family:var(--mono);font-size:10px;padding:8px 12px;border-radius:2px;cursor:pointer;letter-spacing:2px;flex-shrink:0;transition:all .2s;text-shadow:0 0 4px var(--red);}
.gbtn:hover{background:rgba(255,0,51,0.18);box-shadow:0 0 8px var(--glow);}
.gen-box{background:var(--bg2);border:1px solid rgba(255,0,51,0.14);border-radius:2px;padding:10px 12px;font-size:10px;color:rgba(255,0,51,0.45);display:none;line-height:1.7;word-break:break-all;}
.gen-box.show{display:block;}
.gen-key{display:block;font-size:12px;color:var(--red);margin-bottom:4px;}
.cbtn{font-size:9px;letter-spacing:2px;padding:3px 9px;border-radius:2px;cursor:pointer;font-family:var(--mono);background:var(--faint);border:1px solid rgba(255,0,51,0.18);color:rgba(255,0,51,0.5);transition:all .2s;margin-top:4px;display:inline-block;}
.cbtn:hover{background:rgba(255,0,51,0.14);color:var(--red);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;}

/* HEADER */
header{display:flex;align-items:center;gap:12px;padding:10px 20px;border-bottom:1px solid rgba(255,0,51,0.16);background:linear-gradient(180deg,rgba(255,0,51,0.04) 0%,transparent 100%);flex-shrink:0;position:relative;z-index:10;}

.toggle-sidebar{width:32px;height:32px;background:var(--faint);border:1px solid rgba(255,0,51,0.2);border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.toggle-sidebar:hover{background:rgba(255,0,51,0.14);box-shadow:0 0 10px var(--glow);}
.toggle-sidebar svg{width:14px;height:14px;fill:var(--red);transition:transform .35s;}
.sidebar.collapsed ~ .main .toggle-sidebar svg{transform:scaleX(-1);}

/* 3D Heart canvas */
.heart-canvas-wrap{
  width:58px;height:58px;flex-shrink:0;position:relative;
}
#heartCanvas{
  width:58px;height:58px;display:block;
  filter:drop-shadow(0 0 10px rgba(255,0,51,0.7)) drop-shadow(0 0 24px rgba(200,0,30,0.4));
}

/* pulse rings around canvas */
.hring{position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(255,0,51,0.5);opacity:0;animation:hring 1.1s ease-out infinite;pointer-events:none;}
.hring:nth-child(2){animation-delay:.18s;}
@keyframes hring{0%{transform:scale(.65);opacity:.7}100%{transform:scale(2.1);opacity:0}}

.brand{display:flex;flex-direction:column;}
.bname{font-family:var(--disp);font-size:19px;font-weight:900;color:var(--red);text-shadow:0 0 10px var(--red),0 0 26px var(--red2);letter-spacing:3px;line-height:1;}
.bsub{font-size:10px;color:rgba(255,0,51,0.42);letter-spacing:4px;margin-top:3px;}
.hright{margin-left:auto;display:flex;align-items:center;gap:10px;}
.status{display:flex;align-items:center;gap:6px;font-size:10px;color:rgba(255,0,51,0.55);letter-spacing:2px;border:1px solid rgba(255,0,51,0.18);padding:5px 11px;border-radius:2px;background:var(--faint);}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red);animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.28}}

/* MESSAGES */
.messages{flex:1;overflow-y:auto;padding:22px 26px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth;}
.messages::-webkit-scrollbar{width:3px;}
.messages::-webkit-scrollbar-thumb{background:rgba(255,0,51,0.18);border-radius:2px;}
.msg{display:flex;flex-direction:column;max-width:74%;animation:min .28s ease-out;}
@keyframes min{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;align-items:flex-end;}
.msg.ai{align-self:flex-start;align-items:flex-start;}
.mlbl{font-size:9px;letter-spacing:3px;margin-bottom:5px;text-transform:uppercase;}
.msg.user .mlbl{color:rgba(255,255,255,0.2);}
.msg.ai .mlbl{color:rgba(255,0,51,0.45);}
.mbub{padding:12px 16px;border-radius:2px;font-size:13px;line-height:1.75;white-space:pre-wrap;word-break:break-word;}
.msg.user .mbub{background:var(--bg3);border:1px solid rgba(255,255,255,0.07);color:rgba(255,255,255,0.8);border-top-right-radius:0;}
.msg.ai .mbub{background:var(--bg2);border:1px solid rgba(255,0,51,0.17);border-left:2px solid var(--red);color:var(--text);border-top-left-radius:0;}
.typing-bub{display:flex;align-items:center;gap:5px;padding:12px 16px;background:var(--bg2);border:1px solid rgba(255,0,51,0.17);border-left:2px solid var(--red);border-top-left-radius:0;width:fit-content;}
.typing-bub span{width:5px;height:5px;border-radius:50%;background:var(--red);box-shadow:0 0 4px var(--red);animation:db 1.2s ease-in-out infinite;}
.typing-bub span:nth-child(2){animation-delay:.2s;}.typing-bub span:nth-child(3){animation-delay:.4s;}
@keyframes db{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;pointer-events:none;user-select:none;}
.welcome-canvas-wrap{width:160px;height:160px;position:relative;filter:drop-shadow(0 0 24px rgba(255,0,51,0.6));}
#heartCanvasLarge{width:160px;height:160px;display:block;opacity:.7;}
.wt{font-family:var(--disp);font-size:11px;letter-spacing:6px;color:var(--red);opacity:.5;}
.ws{font-size:10px;color:rgba(255,0,51,0.28);letter-spacing:2px;}

/* INPUT */
.input-area{padding:14px 22px 16px;border-top:1px solid rgba(255,0,51,0.12);background:linear-gradient(0deg,rgba(255,0,51,0.02) 0%,transparent 100%);flex-shrink:0;}
.imeta{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
.stgl{display:flex;align-items:center;gap:7px;font-size:10px;color:rgba(255,0,51,0.32);letter-spacing:2px;cursor:pointer;user-select:none;transition:color .2s;}
.stgl:hover{color:rgba(255,0,51,0.6);}
.spill{width:25px;height:13px;background:rgba(255,0,51,0.07);border:1px solid rgba(255,0,51,0.22);border-radius:7px;position:relative;transition:all .2s;}
.spill::after{content:'';width:7px;height:7px;background:rgba(255,0,51,0.32);border-radius:50%;position:absolute;top:2px;left:2px;transition:all .2s;}
.stgl.on .spill{background:rgba(255,0,51,0.18);border-color:var(--red);box-shadow:0 0 6px var(--glow);}
.stgl.on .spill::after{transform:translateX(12px);background:var(--red);box-shadow:0 0 4px var(--red);}
.stgl.on{color:rgba(255,0,51,0.72);}
.irow{display:flex;gap:9px;align-items:flex-end;}
.iwrap{flex:1;position:relative;}
.iwrap::before{content:'>';position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--red);font-size:13px;pointer-events:none;text-shadow:0 0 6px var(--red);}
textarea{width:100%;background:var(--bg2);border:1px solid rgba(255,0,51,0.17);border-radius:2px;color:var(--text);font-family:var(--mono);font-size:13px;padding:12px 12px 12px 28px;resize:none;outline:none;min-height:46px;max-height:130px;transition:border-color .2s,box-shadow .2s;line-height:1.5;}
textarea:focus{border-color:rgba(255,0,51,0.4);box-shadow:0 0 12px var(--glow);}
textarea::placeholder{color:rgba(255,255,255,0.12);}
.sbtn{width:46px;height:46px;background:var(--faint);border:1px solid rgba(255,0,51,0.3);border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.sbtn:hover{background:rgba(255,0,51,0.14);box-shadow:0 0 12px var(--glow);}
.sbtn:active{transform:scale(.93);}
.sbtn svg{width:16px;height:16px;fill:var(--red);filter:drop-shadow(0 0 3px var(--red));}
.ihint{font-size:9px;color:rgba(255,255,255,0.09);letter-spacing:1px;margin-top:6px;padding-left:28px;}

.corner{position:fixed;width:34px;height:34px;pointer-events:none;z-index:300;}
.corner::before,.corner::after{content:'';position:absolute;background:var(--red);box-shadow:0 0 4px var(--red);}
.corner::before{width:100%;height:1px;top:0;left:0;}.corner::after{width:1px;height:100%;top:0;left:0;}
.corner.tl{top:7px;left:7px}.corner.tr{top:7px;right:7px;transform:scaleX(-1)}
.corner.bl{bottom:7px;left:7px;transform:scaleY(-1)}.corner.br{bottom:7px;right:7px;transform:scale(-1)}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--bg3);border:1px solid rgba(255,0,51,0.3);color:var(--red);font-family:var(--mono);font-size:10px;letter-spacing:2px;padding:8px 16px;border-radius:2px;box-shadow:0 0 18px var(--glow);opacity:0;transition:all .28s;pointer-events:none;z-index:9999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">⚙ НАСТРОЙКИ</div>
      <div class="status" style="width:100%">
        <div class="sdot" id="sdot2"></div>
        <span id="stxt2">CONNECTING</span>
      </div>
    </div>
    <div class="sidebar-body">
      <div>
        <div class="sec-lbl">Основной сервер</div>
        <div class="field-row"><span class="field-lbl">URL</span><input class="finp" id="sUrl" type="text" placeholder="https://xxxx.ngrok-free.dev"/></div>
        <div class="field-row"><span class="field-lbl">КЛЮЧ</span><input class="finp" id="sKey" type="text" placeholder="sk-my-main-key-001"/></div>
        <button class="pbtn" onclick="saveDefault()">СОХРАНИТЬ И ПЕРЕПОДКЛЮЧИТЬ</button>
      </div>
      <div>
        <div class="sec-lbl">Ключи для проектов</div>
        <div class="key-list" id="keyList"></div>
      </div>
      <div>
        <div class="sec-lbl">Новый ключ</div>
        <div class="new-form">
          <div class="new-row">
            <input class="finp" id="newName" type="text" placeholder="Название проекта" style="flex:1"/>
            <button class="gbtn" onclick="generateKey()">+</button>
          </div>
          <div class="gen-box" id="genBox">
            <span class="gen-key" id="genKeyVal"></span>
            <span id="genLabel"></span>
            <button class="cbtn" onclick="copyNewKey()">СКОПИРОВАТЬ</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main">
    <header>
      <button class="toggle-sidebar" id="toggleBtn" onclick="toggleSidebar()" title="Свернуть/развернуть">
        <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>

      <!-- 3D Heart in header -->
      <div class="heart-canvas-wrap">
        <div class="hring"></div>
        <div class="hring"></div>
        <canvas id="heartCanvas"></canvas>
      </div>

      <div class="brand">
        <span class="bname">HeartAI</span>
        <span class="bsub">powered by demorg</span>
      </div>
      <div class="hright">
        <div class="status">
          <div class="sdot" id="statusDot"></div>
          <span id="statusText">CONNECTING</span>
        </div>
      </div>
    </header>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <!-- Large 3D heart in welcome screen -->
        <div class="welcome-canvas-wrap">
          <canvas id="heartCanvasLarge"></canvas>
        </div>
        <div class="wt">HEARTAI / demorg</div>
        <div class="ws">МОДЕЛЬ АКТИВНА — НАЧНИ ДИАЛОГ</div>
      </div>
    </div>

    <div class="input-area">
      <div class="imeta">
        <div class="stgl" id="searchToggle" onclick="toggleSearch()">
          <div class="spill"></div>ВЕБ-ПОИСК
        </div>
      </div>
      <div class="irow">
        <div class="iwrap">
          <textarea id="input" placeholder="Задай вопрос demorg..." rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="sbtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
      <div class="ihint">ENTER — отправить · SHIFT+ENTER — новая строка</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ════════════════════════════════
//  3D HEART — Three.js
// ════════════════════════════════

function createHeartGeometry(uSegs, vSegs) {
  const positions = [];
  const normals   = [];
  const uvs       = [];
  const indices   = [];

  // Parametric 3D heart surface:
  // x = 16·sin³(t)·cos(s)
  // y = 13·cos(t) − 5·cos(2t) − 2·cos(3t) − cos(4t)
  // z = 16·sin³(t)·sin(s)  (scaled down for depth)
  function P(t, s) {
    const s3 = Math.pow(Math.sin(t), 3);
    const x  = (16 * s3 * Math.cos(s)) / 18;
    const y  = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) / 18;
    const z  = (16 * s3 * Math.sin(s) * 0.72) / 18; // slightly flat for better look
    return [x, y, z];
  }

  // Build vertices + normals via central differences
  for (let i = 0; i <= uSegs; i++) {
    for (let j = 0; j <= vSegs; j++) {
      const t = (i / uSegs) * Math.PI * 2;
      const s = (j / vSegs) * Math.PI * 2;
      const p = P(t, s);
      positions.push(...p);
      uvs.push(i / uSegs, j / vSegs);

      // Normal via finite differences
      const dt = 0.001, ds = 0.001;
      const pt = P(t + dt, s);
      const ps = P(t, s + ds);
      const tu = [(pt[0]-p[0])/dt, (pt[1]-p[1])/dt, (pt[2]-p[2])/dt];
      const sv = [(ps[0]-p[0])/ds, (ps[1]-p[1])/ds, (ps[2]-p[2])/ds];
      // cross product tu × sv
      let nx = tu[1]*sv[2] - tu[2]*sv[1];
      let ny = tu[2]*sv[0] - tu[0]*sv[2];
      let nz = tu[0]*sv[1] - tu[1]*sv[0];
      const nl = Math.sqrt(nx*nx + ny*ny + nz*nz) || 1;
      normals.push(nx/nl, ny/nl, nz/nl);
    }
  }

  // Indices
  for (let i = 0; i < uSegs; i++) {
    for (let j = 0; j < vSegs; j++) {
      const a = i * (vSegs+1) + j;
      const b = a + 1;
      const c = (i+1) * (vSegs+1) + j;
      const d = c + 1;
      indices.push(a, c, b);
      indices.push(b, c, d);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal',   new THREE.Float32BufferAttribute(normals, 3));
  geo.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(indices);
  return geo;
}

function buildHeartScene(canvas, size) {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setSize(size * dpr, size * dpr, false);
  renderer.setPixelRatio(dpr);
  renderer.setClearColor(0x000000, 0);

  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
  camera.position.set(0, 0.08, 3.0);
  camera.lookAt(0, 0.08, 0);

  // ── LIGHTING ──────────────────────────────────
  // Warm key light from upper-left
  const key = new THREE.DirectionalLight(0xfff0e8, 3.2);
  key.position.set(-2, 3, 4);
  scene.add(key);

  // Cool rim light from back-right (rim highlight)
  const rim = new THREE.DirectionalLight(0xff4466, 1.4);
  rim.position.set(3, -1, -3);
  scene.add(rim);

  // Warm fill from below-right
  const fill = new THREE.DirectionalLight(0xff2200, 0.9);
  fill.position.set(2, -3, 2);
  scene.add(fill);

  // Ambient (dark blood-red)
  const ambient = new THREE.AmbientLight(0x1a0000, 3.0);
  scene.add(ambient);

  // Moving point light to create pulsing glow effect
  const pulse = new THREE.PointLight(0xff0022, 2.5, 6);
  pulse.position.set(0, 0.5, 1.5);
  scene.add(pulse);

  // ── GEOMETRY ──────────────────────────────────
  const geo = createHeartGeometry(72, 72);

  // Main heart body — dark rich red
  const mat = new THREE.MeshPhongMaterial({
    color:    new THREE.Color(0xbb0018),
    specular: new THREE.Color(0xff8888),
    shininess: 90,
    emissive:  new THREE.Color(0x1a0004),
    side: THREE.FrontSide,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = 0.25; // tilt slightly forward
  scene.add(mesh);

  // Subsurface-like inner glow layer (slightly smaller, emissive)
  const innerMat = new THREE.MeshPhongMaterial({
    color:    new THREE.Color(0xff0033),
    emissive: new THREE.Color(0x440008),
    transparent: true,
    opacity: 0.18,
    side: THREE.BackSide,
  });
  const inner = new THREE.Mesh(geo, innerMat);
  inner.rotation.x = 0.25;
  inner.scale.setScalar(1.01);
  scene.add(inner);

  return { renderer, scene, camera, mesh, inner, pulse };
}

// ── Small header heart (58px) ────────────────
const canvasSmall = document.getElementById('heartCanvas');
const { renderer: rSmall, scene: sSmall, camera: cSmall,
        mesh: mSmall, inner: iSmall, pulse: pSmall } = buildHeartScene(canvasSmall, 58);

// ── Large welcome heart (160px) ──────────────
const canvasLarge = document.getElementById('heartCanvasLarge');
const { renderer: rLarge, scene: sLarge, camera: cLarge,
        mesh: mLarge, inner: iLarge, pulse: pLarge } = buildHeartScene(canvasLarge, 160);

// ── ANIMATION LOOP ────────────────────────────
let clock = 0;

function beatScale(t) {
  // Double-pump heartbeat at 1.1s period
  const phase = (t % 1.1) / 1.1;
  let s = 1.0;
  if (phase < 0.08)       s = 1 + 0.18 * Math.sin(phase / 0.08 * Math.PI);
  else if (phase < 0.22)  s = 1 + 0.09 * Math.sin((phase-0.14)/0.08 * Math.PI);
  return s;
}

function animate() {
  requestAnimationFrame(animate);
  clock += 0.016;

  const sc = beatScale(clock);

  // Small heart — slower auto-rotation
  mSmall.rotation.y += 0.008;
  iSmall.rotation.y = mSmall.rotation.y;
  mSmall.scale.setScalar(sc);
  iSmall.scale.setScalar(sc * 1.01);
  pSmall.intensity = 2.5 + (sc - 1) * 14;

  // Large heart — slightly faster rotation, same beat
  mLarge.rotation.y += 0.010;
  iLarge.rotation.y = mLarge.rotation.y;
  mLarge.scale.setScalar(sc);
  iLarge.scale.setScalar(sc * 1.01);
  pLarge.intensity = 2.5 + (sc - 1) * 20;

  rSmall.render(sSmall, cSmall);
  rLarge.render(sLarge, cLarge);
}
animate();

// ════════════════════════════════
//  APP CONFIG
// ════════════════════════════════
const BUILT_IN = {
  url: 'https://sheri-unsymbolised-powerfully.ngrok-free.dev',
  key: 'sk-my-main-key-001'
};

let cfg     = JSON.parse(localStorage.getItem('heartai_cfg')  || 'null') || {...BUILT_IN};
let extKeys = JSON.parse(localStorage.getItem('heartai_keys') || '[]');
let useSearch = false;
let connected = false;
let lastKey = '';
let sidebarOpen = true;

window.onload = () => {
  document.getElementById('sUrl').value = cfg.url;
  document.getElementById('sKey').value = cfg.key;
  renderKeys();
  autoConnect();
};

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
}

function autoConnect() {
  setStatus('CONNECTING', false);
  fetch(`${cfg.url}/v1/health`, { headers:{ Authorization:`Bearer ${cfg.key}` }})
    .then(r => r.json())
    .then(d => {
      connected = true;
      setStatus('ONLINE · ' + (d.parameters || 'demorg'), true);
      hideWelcome();
      addAI('Система инициализирована.\nМодель demorg активна. Сердце бьётся.\n\nЧем могу помочь?');
    })
    .catch(() => {
      setStatus('OFFLINE', false);
      addAI('⚠ Сервер недоступен.\nОткрой боковую панель (☰) → обнови URL сервера.');
    });
}

function setStatus(t, on) {
  ['statusText','stxt2'].forEach(id => document.getElementById(id).textContent = t);
  ['statusDot','sdot2'].forEach(id => {
    const d = document.getElementById(id);
    d.style.background = on ? '#ff0033' : '#550011';
    d.style.boxShadow  = on ? '0 0 6px #ff0033' : 'none';
    d.style.animation  = on ? 'blink 2s ease-in-out infinite' : 'none';
  });
}

function saveDefault() {
  const url = document.getElementById('sUrl').value.trim().replace(/\/$/,'');
  const key = document.getElementById('sKey').value.trim();
  if (!url || !key) { toast('Заполни URL и ключ'); return; }
  cfg = { url, key };
  localStorage.setItem('heartai_cfg', JSON.stringify(cfg));
  toast('Сохранено — переподключаюсь...');
  connected = false;
  setTimeout(autoConnect, 500);
}

function saveExtKeys() { localStorage.setItem('heartai_keys', JSON.stringify(extKeys)); }

function renderKeys() {
  const el = document.getElementById('keyList');
  if (!extKeys.length) { el.innerHTML='<div class="empty-lbl">НЕТ КЛЮЧЕЙ</div>'; return; }
  el.innerHTML = extKeys.map((k,i) => `
    <div class="key-item">
      <div class="ki-top"><div class="ki-dot"></div><div class="ki-name">${esc(k.name)}</div></div>
      <div class="ki-val">${k.key}</div>
      <div class="ki-btns">
        <button class="kbtn cp" onclick="copyKey(${i})">COPY</button>
        <button class="kbtn dl" onclick="deleteKey(${i})">DEL</button>
      </div>
    </div>`).join('');
}

async function generateKey() {
  const name = document.getElementById('newName').value.trim();
  if (!name) { toast('Введи название'); return; }
  let newKey;
  try {
    const r = await fetch(`${cfg.url}/v1/keys/new`,{
      method:'POST',
      headers:{ Authorization:`Bearer ${cfg.key}`, 'Content-Type':'application/json' },
      body: JSON.stringify({ name })
    });
    newKey = (await r.json()).key;
  } catch {
    const b = crypto.getRandomValues(new Uint8Array(16));
    newKey = 'sk-' + Array.from(b).map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  extKeys.push({ name, key: newKey });
  saveExtKeys(); renderKeys();
  lastKey = newKey;
  document.getElementById('genKeyVal').textContent = newKey;
  document.getElementById('genLabel').textContent = 'Проект: ' + name;
  document.getElementById('genBox').classList.add('show');
  document.getElementById('newName').value = '';
  toast('Ключ создан!');
}

function copyNewKey(){ navigator.clipboard.writeText(lastKey); toast('Скопировано!'); }
function copyKey(i){ navigator.clipboard.writeText(extKeys[i].key); toast('Скопировано!'); }
function deleteKey(i){ extKeys.splice(i,1); saveExtKeys(); renderKeys(); toast('Удалён'); }

function hideWelcome(){ const w=document.getElementById('welcome'); if(w) w.style.display='none'; }
function toggleSearch(){ useSearch=!useSearch; document.getElementById('searchToggle').classList.toggle('on',useSearch); }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,130)+'px'; }
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }

function addUser(text){
  const m=document.getElementById('messages');
  const d=document.createElement('div'); d.className='msg user';
  d.innerHTML=`<div class="mlbl">ВЫ</div><div class="mbub">${esc(text)}</div>`;
  m.appendChild(d); m.scrollTop=m.scrollHeight;
}
function addAI(text){
  const m=document.getElementById('messages');
  const d=document.createElement('div'); d.className='msg ai';
  d.innerHTML=`<div class="mlbl">HEARTAI · demorg</div><div class="mbub">${esc(text)}</div>`;
  m.appendChild(d); m.scrollTop=m.scrollHeight;
}
function showTyping(){
  const m=document.getElementById('messages');
  const d=document.createElement('div'); d.className='msg ai'; d.id='typing';
  d.innerHTML=`<div class="mlbl">HEARTAI · demorg</div><div class="typing-bub"><span></span><span></span><span></span></div>`;
  m.appendChild(d); m.scrollTop=m.scrollHeight;
}
function hideTyping(){ const t=document.getElementById('typing'); if(t) t.remove(); }

async function sendMessage(){
  const inp=document.getElementById('input');
  const txt=inp.value.trim(); if(!txt) return;
  hideWelcome(); addUser(txt);
  inp.value=''; inp.style.height='auto';
  showTyping();
  try {
    const r = await fetch(`${cfg.url}/v1/ask`,{
      method:'POST',
      headers:{ Authorization:`Bearer ${cfg.key}`, 'Content-Type':'application/json' },
      body: JSON.stringify({ question:txt, use_search:useSearch })
    });
    const d = await r.json();
    hideTyping();
    if(d.answer)      addAI(d.answer);
    else if(d.detail) addAI('⚠ '+d.detail);
    else              addAI('⚠ Неожиданный ответ');
    connected=true; setStatus('ONLINE · demorg',true);
  } catch(e){
    hideTyping();
    addAI('⚠ Потеряно соединение.\n☰ → обнови URL сервера.');
    connected=false; setStatus('OFFLINE',false);
  }
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
</script>
